<!DOCTYPE html>
<html lang="hi"><head><meta charset="UTF-8"><title>Amazon Deals</title><style>.banner{background:#ff9900;color:white;padding:20px;text-align:center;border-radius:10px;margin-bottom:20px}.card{border:1px solid #ddd;padding:15px;margin:10px;border-radius:10px;text-align:center}.btn{display:block;background:#28a745;color:white;padding:10px;text-decoration:none;border-radius:5px;margin-top:10px}.price{color:red;font-weight:bold}</style></head><body>
<div class="banner"><h2>🔥 Amazon Mega Sale: Up to 80% OFF! 🔥</h2></div>
<div id="product-container"></div>
<script>
const myCategory = 'HamaraMall;
fetch('products.json').then(r=>r.json()).then(data=>{
const container = document.getElementById('product-container');
data.filter(p=>p.category === myCategory).forEach(p=>{
container.innerHTML += `<div class="card"><h3>${p.name}</h3><p class="price">${p.price}</p><a href="${p.link}" target="_blank" class="btn">Grab Deal</a></div>`;
});});
</script></body></html>
