<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Deals | Mobiles & Electronics</title>
    <style>
        body { font-family: sans-serif; background: #f3f3f3; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: center; }
        .btn-buy { display: block; background: #ff9900; padding: 10px; margin-top: 10px; color: white; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="grid" id="product-grid"></div>

<script>
    // यह कोड आपकी products.json फाइल से डेटा लोड करेगा
    fetch('products.json')
        .then(response => response.json())
        .then(products => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div style="font-size:2rem; margin-bottom:10px;">⚡</div>
                    <div style="font-size:0.85rem; font-weight:bold;">${p.name}</div>
                    <a href="${p.link}" target="_blank" class="btn-buy">Buy Now</a>
                </div>
            `).join('');
        })
        .catch(error => console.log('Error loading products:', error));
</script>

</body>
</html>
