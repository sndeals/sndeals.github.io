<!DOCTYPE html>
<html>
<head>
    <title>Amazon Deals</title>
    <style>
        .product-card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 10px; text-align: center; }
        .btn { padding: 10px 20px; background: orange; color: white; text-decoration: none; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Amazon Deals</h1>
    <div id="product-container"></div>

    <script>
        fetch('products.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('product-container');
            // यहाँ 'amazon' लिखा है, यह JSON से सिर्फ amazon के प्रोडक्ट्स उठाएगा
            const filtered = data.filter(p => p.category === 'amazon');
            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <a href="${p.link}" target="_blank" class="btn">Grab Deal</a>
                    </div>`;
            });
        });
    </script>
</body>
</html>
