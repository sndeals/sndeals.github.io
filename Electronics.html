<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics | SN Deals</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
        .site-header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; padding: 25px 15px; text-align: center; }
        .site-nav { background: #0f172a; padding: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-list { list-style: none; margin: 0; padding: 0; display: flex; gap: 10px; justify-content: center; }
        .nav-list a { text-decoration: none; color: #fff; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        .nav-list a:hover { background: #334155; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e5e7eb; text-align: center; transition: 0.3s; }
        .btn-load { display: block; width: 200px; margin: 20px auto; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .buy-btn { display: block; background: #ff9900; padding: 10px; margin-top: 10px; color: black; text-decoration: none; font-weight: bold; border-radius: 6px; }
    </style>
</head>
<body>

    <header class="site-header">
        <h1>Electronics Store</h1>
    </header>
    
    <nav class="site-nav">
        <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="Mobiles.html">Mobiles</a></li>
            <li><a href="Electronics.html" style="background:#fff; color:#0f172a;">Electronics</a></li>
        </ul>
    </nav>

    <div class="grid" id="product-grid"></div>
    <button class="btn-load" onclick="loadMore()">Load More Products</button>

    <script>
        // यहाँ अपने सभी प्रोडक्ट्स डालें। जब 1000 हो जाएं, तो बस इसी लिस्ट में जोड़ते रहें।
        const allProducts = [
            { name: "Premium Gadget 1", link: "https://link.amazon/B07H74QzY" },
            { name: "Premium Gadget 2", link: "https://link.amazon/B0cTtjMIQ" },
            { name: "Premium Gadget 3", link: "https://link.amazon/B0exj1QWj" },
            { name: "Premium Gadget 4", link: "https://link.amazon/B0fzmITPn" },
            { name: "Premium Gadget 5", link: "https://link.amazon/B0fErdMH4" }
            // यहाँ और भी प्रोडक्ट्स जोड़ते जाएं...
        ];

        let index = 0;
        const limit = 10; // एक बार में 10 दिखेंगे

        function loadMore() {
            const grid = document.getElementById('product-grid');
            for (let i = 0; i < limit && index < allProducts.length; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <div style="font-size:1.5rem;">⚡</div>
                        <div style="font-size:0.85rem; font-weight:bold; height:35px;">${allProducts[index].name}</div>
                        <a href="${allProducts[index].link}" target="_blank" class="buy-btn">Buy Now</a>
                    </div>
                `;
                index++;
            }
            if(index >= allProducts.length) document.querySelector('.btn-load').style.display = 'none';
        }
        
        loadMore(); // पेज लोड होते ही पहले 10 दिखाएं
    </script>
</body>
</html>
