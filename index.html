<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SN Deals - Live Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f1f3f6; }
        .header { background: #232f3e; color: white; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 5px; text-align: center; border: 1px solid #ccc; }
        .card img { width: 100%; height: 120px; object-fit: contain; }
        .btn { display: block; width: 100%; padding: 8px; margin-top: 5px; cursor: pointer; font-weight: bold; border: none; }
        .cart { background: #ffd814; }
        .buy { background: #fa8900; color: white; }
    </style>
</head>
<body>

<div class="header"><h1>SN Deals | 1000+ Offers</h1></div>

<div class="grid" id="main"></div>

<script>
    // आपके लिंक्स यहाँ फिक्स हैं
    const links = [
        "https://bitli.in/cAEMfDZ", "https://bitli.in/VgtP4S9", "https://bitli.in/Na3HLul",
        "https://link.amazon/B04n3JKLX", "https://link.amazon/B0jfKbzZw", "https://link.amazon/B0fis2wy4"
    ];
    
    const container = document.getElementById('main');
    
    // 1000 प्रोडक्ट्स जनरेट होंगे
    for (let i = 1; i <= 1000; i++) {
        let link = links[i % links.length];
        container.innerHTML += `
            <div class="card">
                <img src="https://placehold.co/200x200?text=Product+${i}" alt="Product">
                <div style="font-size:0.8rem; font-weight:bold;">Premium Deal ${i}</div>
                <div style="color:red; font-weight:bold;">₹${Math.floor(Math.random() * 20000) + 500}</div>
                <button class="btn cart" onclick="alert('Added!')">Add To Cart</button>
                <button class="btn buy" onclick="window.open('${link}', '_blank')">Buy Now</button>
            </div>
        `;
    }
</script>

</body>
</html>
