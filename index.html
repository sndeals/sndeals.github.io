 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Deals - Live Deals Hub</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; }
        .header { background: #232f3e; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .logo { color: white; font-weight: bold; font-size: 1.5rem; }
        .search-box { width: 300px; padding: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 15px; text-align: center; border: 1px solid #ddd; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .btn { display: block; background: #ff9900; padding: 10px; margin-top: 5px; text-decoration: none; color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SN Deals</div>
    <input type="text" class="search-box" placeholder="Search 1,000+ live products...">
</div>

<div class="grid" id="container"></div>

<script>
    // Ye raha aapka original format
    const products = Array.from({length: 50}, (_, i) => ({
        name: `Product ${i + 1}`,
        price: 1000 + (i * 50),
        // Yeh line image error fix karti hai
        img: `https://picsum.photos/seed/${i}/200/200` 
    }));

    const container = document.getElementById('container');
    products.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <img src="${p.img}" onerror="this.src='https://placehold.co/200x200?text=Product'">
                <h3>${p.name}</h3>
                <p>₹${p.price}</p>
                <a href="#" class="btn">Add to Cart</a>
                <a href="#" class="btn" style="background:#f3a847">Buy Now</a>
            </div>
        `;
    });
</script>

</body>
</html>
