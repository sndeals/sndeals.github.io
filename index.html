<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DEALS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        .header { background: #232f3e; color: #fff; padding: 15px; text-align: center; }
        .section { background: #fff; margin: 10px 0; padding: 10px; }
        .sec-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #333; text-transform: uppercase; }
        
        /* ये कोड कार्ड्स को एक लाइन में स्क्रॉल कराएगा */
        .scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
        .scroll::-webkit-scrollbar { display: none; }
        
        .card { min-width: 130px; max-width: 130px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; text-align: center; background: #fff; flex-shrink: 0; }
        
        .card-name { font-size: 13px; height: 35px; overflow: hidden; margin-bottom: 5px; color: #555; }
        .price { color: #b12704; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .btn { display: block; background: #ff9900; color: #000; padding: 6px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header"><h1>SN DEALS</h1></div>
    <div id="content"></div>

    <script>
        fetch('products.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('content');
            const categories = [...new Set(data.map(p => p.category))];
            
            categories.forEach(cat => {
                let html = `<div class="section"><div class="sec-title">${cat}</div><div class="scroll">`;
                
                data.filter(p => p.category === cat).forEach(p => {
                    html += `
                        <div class="card">
                            <div class="card-name">${p.name}</div>
                            <div class="price">${p.price}</div>
                            <a href="${p.link}" target="_blank" class="btn">Grab Deal</a>
                        </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        });
    </script>
</body>
</html>
