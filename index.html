<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Deals Hub - 1000+ Live Offers</title>
    <style>
        :root {
            --amazon-dark: #131921;
            --amazon-light: #232f3e;
            --amazon-orange: #ff9900;
            --amazon-yellow: #febd69;
            --bg-gray: #f3f3f3;
        }

        body { font-family: 'Amazon Ember', Arial, sans-serif; margin: 0; background: var(--bg-gray); color: #111; }
        
        /* Navigation */
        .site-nav { background: var(--amazon-dark); padding: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
        .logo { color: #fff; font-weight: bold; font-size: 1.4rem; text-decoration: none; }
        .search-wrapper { flex-grow: 1; display: flex; }
        .search-input { width: 100%; padding: 10px; border: none; border-radius: 4px 0 0 4px; outline: none; }
        .search-btn { background: var(--amazon-orange); border: none; padding: 10px 15px; border-radius: 0 4px 4px 0; cursor: pointer; }

        /* Products Grid */
        .main-container { max-width: 1200px; margin: 20px auto; padding: 0 10px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        
        .product-card { background: #fff; padding: 15px; border-radius: 4px; display: flex; flex-direction: column; border: 1px solid #ddd; }
        .product-img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; }
        .product-name { font-size: 0.85rem; height: 40px; overflow: hidden; margin-bottom: 5px; }
        .price { font-size: 1.1rem; font-weight: bold; color: #B12704; }
        .btn-buy { margin-top: 10px; background: var(--amazon-yellow); border: 1px solid #a88734; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; color: black; }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-container">
            <a href="#" class="logo">Amazon</a>
            <div class="search-wrapper">
                <input type="text" id="search-box" class="search-input" placeholder="Search products..." oninput="renderProducts()">
                <button class="search-btn">🔍</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="products-grid" id="products-container"></div>
    </div>

    <script>
        // Data generator
        const products = Array.from({length: 100}, (_, i) => ({
            id: i,
            name: `Product Item Number ${i + 1}`,
            price: Math.floor(Math.random() * 5000) + 500,
            img: `https://picsum.photos/seed/${i}/300/300` 
        }));

        function renderProducts() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const container = document.getElementById('products-container');
            container.innerHTML = "";

            products.filter(p => p.name.toLowerCase().includes(query)).forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-img" onerror="this.src='https://placehold.co/300x300?text=Image+Loading'">
                        <div class="product-name">${p.name}</div>
                        <div class="price">₹${p.price}</div>
                        <a href="#" class="btn-buy">Add to Cart</a>
                    </div>
                `;
            });
        }

        renderProducts();
    </script>
</body>
</html>
