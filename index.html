<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DEALS - LIVE OFFERS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f4f4; }
        .header { background: #232f3e; color: #fff; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section { background: #fff; margin: 10px 0; padding: 15px; }
        .sec-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid #ff9900; padding-left: 10px; text-transform: capitalize; }
        .scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none; }
        .scroll::-webkit-scrollbar { display: none; }
        .card { min-width: 140px; border: 1px solid #eee; border-radius: 8px; padding: 10px; text-align: center; background: #fff; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 5px; }
        .card-name { font-size: 12px; height: 35px; overflow: hidden; margin-bottom: 5px; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { color: #b12704; font-weight: bold; margin: 8px 0; font-size: 13px; }
        .btn { display: block; background: #ff9900; color: #000; padding: 8px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header"><h1>SN DEALS</h1></div>

    <div id="content"></div>

    <script>
        fetch('products.json')
        .then(res => {
            if (!res.ok) throw new Error("JSON file not found");
            return res.json();
        })
        .then(data => {
            const container = document.getElementById('content');
            const cats = [...new Set(data.map(item => item.category))];
            
            cats.forEach(cat => {
                let html = `<div class="section"><div class="sec-title">${cat}</div><div class="scroll">`;
                data.filter(p => p.category === cat).forEach(p => {
                    const img = p.image || 'https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg';
                    html += `
                        <div class="card">
                            <img src="${img}" onerror="this.src='https://via.placeholder.com/80'">
                            <div class="card-name">${p.name}</div>
                            <div class="price">${p.price}</div>
                            <a href="${p.link}" target="_blank" class="btn">Grab Deal</a>
                        </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        })
        .catch(err => {
            document.getElementById('content').innerHTML = `<p style="text-align:center; padding:20px;">Unable to load deals. Please check if products.json exists.</p>`;
            console.error(err);
        });
    </script>
</body>
</html>
