<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>SN Deals | Premium Store</title>
    <style>

        .hero { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .btn { display: inline-block; padding: 12px 25px; background: #1f2937; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Welcome to SN Deals</h1>
    <p>Your one-stop destination for premium handpicked offers.</p>
</div>

<div class="nav-grid">
    <div class="card">
        <h2>⚡ Mobiles</h2>
        <p>Latest gadgets and electronics</p>
        <a href="Mobiles.html" class="btn">Explore Now</a>
    </div>
    <div class="card">
        <h2>🧸 NikolaToy</h2>
        <p>Premium toys & kids wear</p>
        <a href="NikolaToy.html" class="btn">View Store</a>
    </div>
    <div class="card">
        <h2>🔥 All Deals</h2>
        <p>Check all latest offers</p>
        <a href="StoreOffers.html" class="btn">View All</a>
    </div>
</div>

</body>
</html>
