<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DEALS</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        /* Professional Header */
        .header { background: #232f3e; color: #fff; padding: 20px; text-align: center; }
        /* Section Styling */
        .section { background: #fff; margin: 10px 0; padding: 15px; }
        .sec-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid #ff9900; padding-left: 10px; }
        .scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        .card { min-width: 130px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; }
        .card img { width: 80px; height: 80px; object-fit: contain; }
        .price { color: #b12704; font-weight: bold; margin: 8px 0; }
        .btn { display: block; background: #ff9900; color: #000; padding: 8px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header"><h1>SN DEALS - LIVE OFFERS</h1></div>

    <div id="content"></div>

    <script>
        // यह कोड JSON को खुद ढूँढेगा और स्क्रीन पर सजा देगा
        fetch('products.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('content');
            const cats = [...new Set(data.map(item => item.category))];
            
            cats.forEach(cat => {
                let html = `<div class="section"><div class="sec-title">${cat.toUpperCase()}</div><div class="scroll">`;
                data.filter(p => p.category === cat).forEach(p => {
                    // इमेज नहीं है तो Amazon का लोगो डिफ़ॉल्ट ले लेगा
                    const img = p.image || 'https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg';
                    html += `
                        <div class="card">
                            <img src="${img}" onerror="this.src='https://via.placeholder.com/80'">
                            <div style="font-size:12px; height:30px; overflow:hidden;">${p.name}</div>
                            <div class="price">${p.price}</div>
                            <a href="${p.link}" target="_blank" class="btn">Grab Deal</a>
                        </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        });
    </script>
</body>
</html>
