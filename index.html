<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Deals - Live Deals Hub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        .header { background: #232f3e; padding: 20px; text-align: center; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 15px; text-align: center; border: 1px solid #ddd; border-radius: 5px; }
        .card img { width: 100%; height: 150px; object-fit: contain; background: #eee; }
        .btn { display: block; background: #ff9900; padding: 8px; margin-top: 5px; text-decoration: none; color: black; font-weight: bold; font-size: 0.9rem; border-radius: 3px; }
        .buy { background: #fa8900; }
    </style>
</head>
<body>

<div class="header">
    <h1>🔥 Live Deals Hub (1050 Offers Active)</h1>
</div>

<div class="grid" id="container"></div>

<script>
    const categories = ["Laptop", "Smart TV", "Washing Machine", "Fridge", "Mobile", "Gadgets", "Tools"];
    const container = document.getElementById('container');

    // 1050 products ka loop
    for(let i = 1; i <= 1050; i++) {
        const cat = categories[i % categories.length];
        container.innerHTML += `
            <div class="card">
                <img src="https://picsum.photos/seed/${i}/200/200" onerror="this.src='https://placehold.co/200x200?text=Product'">
                <h4>${cat} - V${i}</h4>
                <p>₹${(Math.random() * 50000 + 1000).toFixed(0)}</p>
                <a href="#" class="btn">Add to Cart</a>
                <a href="#" class="btn buy">Buy Now</a>
            </div>
        `;
    }
</script>

</body>
</html>
